repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.17
    hooks:
      - id: ruff
        args: [ --fix ]
      - id: ruff-format
  - repo: local
    hooks:
      - id: pyrefly
        name: pyrefly type-check
        entry: uv run pyrefly check src/
        language: system
        types: [python]
        pass_filenames: false
      - id: pytest
        name: pytest suite
        entry: uv run pytest
        language: system
        pass_filenames: false
        always_run: true
